        function shuffleArray(array, seed) { const s = [...array]; for (let i = s.length - 1; i > 0; i--) { const j = Math.floor(seededRandom(seed + i) * (i + 1)); [s[i], s[j]] = [s[j], s[i]]; } return s; }
        function selectRandomQuestions(pool, count, seed) { return shuffleArray(pool, seed).slice(0, count); }

            document.getElementById('quizSection').classList.remove('active');
            document.getElementById('resultsSection').classList.add('active');
        }

        function sendToGoogleSheets() {
            const correctCount = parseInt(document.getElementById('scoreNumber').textContent) * 50 / 100;
            const percentage = parseInt(document.getElementById('scoreNumber').textContent);
            const u = UI[currentLang];
            fetch('https://script.google.com/macros/s/AKfycbxRDUifoBkjbTt-hLXyZydwtyh9qmuPSlX7mTVpCmO7SFBNwNALEYnLXRVIWm-uyAs/exec', {
                method: 'POST', body: JSON.stringify({ name: userData.name, residencyNumber: userData.residencyNumber, restaurant: userData.restaurantName, score: correctCount, percentage: percentage, totalQuestions: 50, timestamp: new Date().toLocaleString('ar-SA') }), mode: 'no-cors'
            }).then(() => {
                document.getElementById('messagesContainer').innerHTML = `<div class="success-message">${u.sendSuccess}</div>`;
                setTimeout(() => { document.getElementById('messagesContainer').innerHTML = ''; }, 3000);
            }).catch(error => {
                document.getElementById('messagesContainer').innerHTML = `<div class="error-message">${u.sendError}</div>`;
                setTimeout(() => { document.getElementById('messagesContainer').innerHTML = ''; }, 3000);
            });
        }

        function resetQuiz() {
            currentQuestionIndex = 0; userAnswers = []; userData = { name: '', residencyNumber: '', restaurantName: '' };
            document.getElementById('registrationForm').reset();
            document.getElementById('registrationSection').style.display = 'block';
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('messagesContainer').innerHTML = '';
            document.getElementById('langSelector').style.display = 'flex';
            stopTimer();
        }
    </script>
</body>
</html>
